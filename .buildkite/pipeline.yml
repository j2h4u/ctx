env:
  CARGO_TERM_COLOR: "always"
  CARGO_BUILD_JOBS: "2"
  RUST_TEST_THREADS: "2"

steps:
  - label: ":mag: search MVP"
    key: "search-mvp"
    command: "./scripts/check.sh"
    agents:
      queue: "release-linux-managed"
      ctx-runner-class: "release-linux-x64-stage"
      os: "linux"
      arch: "x86_64"
    timeout_in_minutes: 45
    artifact_paths:
      - "target/ctx-artifacts/*"
      - "target/ctx-artifacts/**/*"
